[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["venv", ".venv", "uploads"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]  # delegamos longitud al formatter

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # imports defensivos en tests

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "venv|\\.venv|uploads"
