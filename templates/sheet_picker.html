{% extends 'base.html' %}

{% block title %}Selecciona una hoja — {{ filename }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">
                    <i class="bi bi-file-earmark-spreadsheet me-2"></i>{{ filename }}
                </h5>
                <p class="text-muted small mb-3">
                    Este archivo contiene varias hojas. Selecciona la que quieres analizar:
                </p>
                <form action="{{ url_for('uploads.process_sheet') }}" method="POST" class="d-flex gap-2">
                    <select name="sheet" class="form-select">
                        {% for s in sheets %}
                            <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-play-fill me-1"></i> Analizar
                    </button>
                </form>
                <div class="mt-3 text-end">
                    <a href="{{ url_for('dashboard.index') }}" class="btn btn-link btn-sm text-muted">
                        Cancelar y subir otro archivo
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
